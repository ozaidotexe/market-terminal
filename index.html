<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #1a1a1a; 
            color: white; 
            text-align: center; 
            padding: 20px; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 90vh; /* Sedikit lebih tinggi agar nyaman */
            overflow: hidden;
        }

        /* Container Animasi Radar */
        .radar-container {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto 30px;
            display: none; /* Sembunyi di awal */
        }

        .radar {
            width: 100%;
            height: 100%;
            border: 2px solid #248bcf;
            border-radius: 50%;
            position: absolute;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .btn-hunt { 
            background: linear-gradient(135deg, #248bcf, #0056b3); 
            color: white; 
            border: none; 
            padding: 20px; 
            border-radius: 15px; 
            font-size: 1.2rem;
            font-weight: bold; 
            width: 100%; 
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-hunt:disabled {
            background: #444;
            transform: scale(1);
            cursor: not-allowed;
        }

        .status-text {
            color: #248bcf;
            font-weight: bold;
            margin-top: 15px;
            min-height: 1.2em;
        }

        h2 { color: #248bcf; margin-top: 0; }
        p { color: #aaa; margin-bottom: 30px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div id="main-ui">
        <h2>🎯 Bug Box Terminal</h2>
        <p id="desc">Sistem siap. Klik tombol untuk memindai market.</p>
        
        <div id="radar" class="radar-container">
            <div class="radar"></div>
            <div class="radar" style="animation-delay: 0.5s"></div>
            <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:2rem;">🛰️</div>
        </div>

        <button id="hunt-btn" class="btn-hunt" onclick="startHunting()">GAS HUNTING SEKARANG!</button>
        <div id="status" class="status-text"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); 

        function startHunting() {
            const btn = document.getElementById('hunt-btn');
            const radar = document.getElementById('radar');
            const status = document.getElementById('status');
            const desc = document.getElementById('desc');

            // 1. Haptic Feedback (Vibrate)
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');

            // 2. Ubah UI ke mode Hunting
            btn.disabled = true;
            btn.style.display = 'none';
            radar.style.display = 'block';
            desc.innerText = "Sedang memindai koordinat aset...";
            
            let progress = 0;
            const texts = [
                "Menghubungkan ke satelit...",
                "Memindai antrean market...",
                "Mencoba membobol Box...",
                "Hampir selesai..."
            ];

            // 3. Simulasi Proses (Misal 4 Detik)
            const interval = setInterval(() => {
                status.innerText = texts[progress];
                progress++;
                
                if (progress >= texts.length) {
                    clearInterval(interval);
                    finishHunting();
                }
            }, 1000);
        }

        function finishHunting() {
            const status = document.getElementById('status');
            status.style.color = "#00ff00";
            status.innerText = "DATA TERKIRIM KE TELEGRAM!";

            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');

            // 4. Kirim data ke Bot Python di akhir proses
            // Ini akan menutup WebApp secara otomatis
            setTimeout(() => {
                tg.sendData("proses_hunt");
                tg.close();
            }, 800);
        }
    </script>
</body>
</html>
