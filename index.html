<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .btn-hunt { background: #248bcf; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; width: 100%; }
    </style>
</head>
<body>
    <h2>🎯 Bug Box Hunting</h2>
    <p>Klik tombol di bawah untuk mulai berburu!</p>
    <button class="btn-hunt" onclick="doHunt()">GAS HUNTING!</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Membuka WebApp secara penuh

        function doHunt() {
            // Mengirim pesan kembali ke bot untuk diproses secara backend
            tg.sendData("proses_hunt_sekarang");
            tg.close();
        }
    </script>
</body>
</html>
